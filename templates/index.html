<!DOCTYPE html>
<html>
<head>
    <title>Restaurant Booking</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    
    <div class="glass-card p-4">

        <h1 class="restaurant-name text-center">🍽️ The Bonita feels</h1>
        <h5 class="text-center mb-4">Reserve Your Table</h5>
        <form action="/book" method="POST">

            <input type="text" name="name" class="form-control mb-3" placeholder="Enter your name" required>

            <input type="date" name="date" class="form-control mb-3" required>

            <input type="time" name="time" class="form-control mb-3" required>

            <button type="submit" class="btn btn-success w-100">Book Table</button>

        </form>

        <hr>

        <h5 class="mt-3">📋 Bookings</h5>

        <ul class="list-group mt-2">
            {% for b in bookings %}
                <li class="list-group-item fancy-item">
                    {{ b.name }} - {{ b.date }} at {{ b.time }}
                </li>
            {% endfor %}
        </ul>

    </div>

</div>

</body>
</html>
